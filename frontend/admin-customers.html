<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Balloons Galore Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-gradient-to-b from-pink-600 to-purple-600 text-white fixed h-full z-20 transform transition-transform lg:translate-x-0 -translate-x-full">
            <div class="p-6">
                <h1 class="text-2xl font-bold">🎈 Balloons Galore</h1>
                <p class="text-pink-200 text-sm">Admin Panel</p>
            </div>
            
            <nav class="mt-6">
                <a href="admin-dashboard.html" class="flex items-center px-6 py-3 hover:bg-white hover:bg-opacity-10 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                
                <a href="admin-orders.html" class="flex items-center px-6 py-3 hover:bg-white hover:bg-opacity-10 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    Orders
                </a>
                
                <a href="admin-products.html" class="flex items-center px-6 py-3 hover:bg-white hover:bg-opacity-10 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    Products
                </a>
                
                <a href="admin-customers.html" class="flex items-center px-6 py-3 bg-white bg-opacity-20 border-l-4 border-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Customers
                </a>
                
                <div class="mt-6 px-6">
                    <button onclick="logout()" class="flex items-center w-full px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg transition">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                        Logout
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 lg:ml-64">
            <!-- Top Bar -->
            <header class="bg-white shadow-sm sticky top-0 z-10">
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center">
                        <button onclick="toggleSidebar()" class="lg:hidden mr-4 text-gray-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <h2 class="text-2xl font-bold text-gray-800">Customers</h2>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="text-right">
                            <p class="text-sm font-semibold text-gray-800" id="adminName">Admin User</p>
                            <p class="text-xs text-gray-500" id="adminEmail">admin@example.com</p>
                        </div>
                        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                            A
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <main class="p-6">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm font-medium">Total Customers</p>
                                <p class="text-3xl font-bold text-gray-800 mt-2" id="totalCustomers">-</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm font-medium">Repeat Customers</p>
                                <p class="text-3xl font-bold text-gray-800 mt-2" id="repeatCustomers">-</p>
                            </div>
                            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm font-medium">Avg. Order Value</p>
                                <p class="text-3xl font-bold text-gray-800 mt-2" id="avgOrderValue">-</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Search -->
                <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Search by customer name or email..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent"
                    >
                </div>

                <!-- Customers Table -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr class="text-left text-gray-600 text-sm">
                                    <th class="px-6 py-4 font-semibold">Customer</th>
                                    <th class="px-6 py-4 font-semibold">Email</th>
                                    <th class="px-6 py-4 font-semibold">Phone</th>
                                    <th class="px-6 py-4 font-semibold">Orders</th>
                                    <th class="px-6 py-4 font-semibold">Total Spent</th>
                                    <th class="px-6 py-4 font-semibold">Last Order</th>
                                </tr>
                            </thead>
                            <tbody id="customersTableBody">
                                <tr>
                                    <td colspan="6" class="px-6 py-12 text-center">
                                        <div class="flex flex-col items-center">
                                            <div class="animate-spin rounded-full h-12 w-12 border-4 border-pink-500 border-t-transparent mb-4"></div>
                                            <p class="text-gray-500">Loading customers...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/admin-auth.js"></script>
    <script>
        // Format currency
        function formatCurrency(amount) {
            return `Rs. ${parseFloat(amount).toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            })}`;
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric'
            });
        }

        // Load customers
        async function loadCustomers() {
            try {
                const response = await authenticatedFetch(`${API_URL}/orders`);
                const data = await response.json();
                
                if (data.success) {
                    processCustomers(data.orders);
                }
            } catch (error) {
                console.error('Error loading customers:', error);
                document.getElementById('customersTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-red-500">
                            Failed to load customers
                        </td>
                    </tr>
                `;
            }
        }

        // Process orders into customer data
        function processCustomers(orders) {
            const customersMap = new Map();

            orders.forEach(order => {
                const key = order.customer_email;
                
                if (customersMap.has(key)) {
                    const customer = customersMap.get(key);
                    customer.orderCount++;
                    customer.totalSpent += parseFloat(order.total_amount);
                    if (new Date(order.created_at) > new Date(customer.lastOrder)) {
                        customer.lastOrder = order.created_at;
                    }
                } else {
                    customersMap.set(key, {
                        name: order.customer_name,
                        email: order.customer_email,
                        phone: order.customer_phone,
                        orderCount: 1,
                        totalSpent: parseFloat(order.total_amount),
                        lastOrder: order.created_at
                    });
                }
            });

            const customers = Array.from(customersMap.values());
            displayCustomers(customers);
            updateStats(customers);
        }

        // Display customers
        function displayCustomers(customers) {
            const tbody = document.getElementById('customersTableBody');
            
            if (customers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-gray-400">
                            No customers yet
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = customers.map(customer => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-purple-500 rounded-full flex items-center justify-center text-white font-bold mr-3">
                                ${customer.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="font-medium text-gray-800">${escapeHtml(customer.name)}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-gray-600">${escapeHtml(customer.email)}</td>
                    <td class="px-6 py-4 text-gray-600">${escapeHtml(customer.phone)}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-semibold">
                            ${customer.orderCount}
                        </span>
                    </td>
                    <td class="px-6 py-4 font-semibold text-gray-800">${formatCurrency(customer.totalSpent)}</td>
                    <td class="px-6 py-4 text-gray-600">${formatDate(customer.lastOrder)}</td>
                </tr>
            `).join('');
        }

        // Update stats
        function updateStats(customers) {
            const totalCustomers = customers.length;
            const repeatCustomers = customers.filter(c => c.orderCount > 1).length;
            const totalSpent = customers.reduce((sum, c) => sum + c.totalSpent, 0);
            const totalOrders = customers.reduce((sum, c) => sum + c.orderCount, 0);
            const avgOrderValue = totalOrders > 0 ? totalSpent / totalOrders : 0;

            document.getElementById('totalCustomers').textContent = totalCustomers;
            document.getElementById('repeatCustomers').textContent = repeatCustomers;
            document.getElementById('avgOrderValue').textContent = formatCurrency(avgOrderValue);
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            try {
                const response = await authenticatedFetch(`${API_URL}/orders`);
                const data = await response.json();
                
                if (data.success) {
                    const customersMap = new Map();
                    
                    data.orders.forEach(order => {
                        const key = order.customer_email;
                        
                        if (customersMap.has(key)) {
                            const customer = customersMap.get(key);
                            customer.orderCount++;
                            customer.totalSpent += parseFloat(order.total_amount);
                            if (new Date(order.created_at) > new Date(customer.lastOrder)) {
                                customer.lastOrder = order.created_at;
                            }
                        } else {
                            customersMap.set(key, {
                                name: order.customer_name,
                                email: order.customer_email,
                                phone: order.customer_phone,
                                orderCount: 1,
                                totalSpent: parseFloat(order.total_amount),
                                lastOrder: order.created_at
                            });
                        }
                    });
                    
                    let customers = Array.from(customersMap.values());
                    
                    if (searchTerm) {
                        customers = customers.filter(c => 
                            c.name.toLowerCase().includes(searchTerm) ||
                            c.email.toLowerCase().includes(searchTerm)
                        );
                    }
                    
                    displayCustomers(customers);
                }
            } catch (error) {
                console.error('Search error:', error);
            }
        });

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
</body>
</html>
